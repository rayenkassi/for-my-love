<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Klaudia 💖</title>

<style>
body {
  margin: 0;
  font-family: 'Arial', sans-serif;
  background: linear-gradient(to bottom, #ffe6f0, #fff);
  text-align: center;
  overflow: hidden;
}

h1 {
  margin-top: 100px;
  color: #ff4d88;
}

button {
  padding: 15px 30px;
  font-size: 18px;
  border: none;
  background-color: #ff66a3;
  color: white;
  border-radius: 12px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background-color: #ff3385;
}

#content {
  display: none;
  margin-top: 30px;
  animation: fadeIn 1.5s ease-in-out;
}

img {
  width: 220px;
  animation: float 3s infinite ease-in-out;
}

@keyframes fadeIn {
  from {opacity: 0;}
  to {opacity: 1;}
}

@keyframes float {
  0% { transform: translateY(0px); }
  50% { transform: translateY(-15px); }
  100% { transform: translateY(0px); }
}

/* Hearts animation */
.heart {
  position: absolute;
  color: pink;
  animation: fall linear infinite;
}

@keyframes fall {
  from {
    transform: translateY(-10vh);
  }
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<body>

<h1>Klaudia 💕</h1>
<button onclick="showLove()">See more</button>

<div id="content">
  <img src="https://upload.wikimedia.org/wikipedia/en/0/05/Hello_Kitty_character_portrait.png">
  <h2>I'm sorry 😔</h2>
  <p>
    Klaudia, I love you so much 💖<br><br>
    You mean everything to me...<br>
    Let's start a new chapter together ✨<br><br>
    Forever yours 💕
  </p>
</div>

<script>
function showLove() {
  document.getElementById("content").style.display = "block";
  createHearts();
}

function createHearts() {
  for (let i = 0; i < 30; i++) {
    let heart = document.createElement("div");
    heart.className = "heart";
    heart.innerHTML = "💖";
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.animationDuration = (Math.random() * 3 + 2) + "s";
    document.body.appendChild(heart);
  }
}
</script>

</body>
</html>
